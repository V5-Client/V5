name: Prettier Auto Format

on:
    push:
        branches:
            - '**'

permissions:
    contents: write

jobs:
    prettier:
        if: github.actor != 'prettier-bot'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Run Prettier (download via npx)
              run: npx --yes prettier@3 --write "**/*.js"

            - name: Commit and push if changed
              run: |
                  if git diff --quiet; then
                    echo "No formatting changes"
                    exit 0
                  fi

                  git config user.name "prettier-bot"
                  git config user.email "prettier-bot@users.noreply.github.com"

                  git add .
                  git commit -m "chore: auto-format with Prettier"
                  git push
