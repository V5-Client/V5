name: Run discord-commit on specific SHA

on:
    workflow_dispatch:
        inputs:
            sha:
                description: 'Commit SHA to run discord-commit against'
                required: true
                type: string

jobs:
    dispatch:
        runs-on: ubuntu-24.04
        steps:
            - name: Dispatch discord-commit workflow on main
              uses: actions/github-script@v7
              with:
                  script: |
                      const sha = core.getInput('sha').trim();
                      if (!sha) throw new Error("sha input is required");

                      // This must match the workflow file name below:
                      const workflowFile = "discord-commit.yml";

                      await github.rest.actions.createWorkflowDispatch({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        workflow_id: workflowFile,
                        ref: "main", // ensures "latest workflow" is used
                        inputs: { sha }
                      });

                      core.info(`Dispatched ${workflowFile} on ref=main with sha=${sha}`);
