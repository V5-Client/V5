name: Run discord-commit on specific SHA

on:
    workflow_dispatch:
        inputs:
            sha:
                description: 'Commit SHA to run discord-commit against'
                required: true
                type: string

permissions:
    actions: write
    contents: read

jobs:
    dispatch:
        runs-on: ubuntu-24.04
        steps:
            - name: Dispatch discord-commit workflow on main
              uses: actions/github-script@v7
              with:
                  script: |
                      const sha = (context.payload.inputs && context.payload.inputs.sha)
                        ? String(context.payload.inputs.sha).trim()
                        : "";

                      if (!sha) {
                        core.setFailed("sha input is required");
                        return;
                      }

                      await github.rest.actions.createWorkflowDispatch({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        workflow_id: "discord-commit.yml",
                        ref: "main",
                        inputs: { sha }
                      });

                      core.info(`Dispatched discord-commit.yml on main for sha=${sha}`);
