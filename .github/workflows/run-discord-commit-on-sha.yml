name: Run discord-commit on specific SHA

on:
    workflow_dispatch:
        inputs:
            sha:
                description: 'Commit SHA to run discord-commit against'
                required: true
                type: string

jobs:
    dispatch:
        runs-on: ubuntu-24.04
        steps:
            - name: Dispatch discord-commit workflow on main
              uses: actions/github-script@v7
              with:
                  script: |
                      const sha = (context.payload.inputs && context.payload.inputs.sha)
                        ? String(context.payload.inputs.sha).trim()
                        : "";

                      if (!sha) {
                        core.setFailed("sha input is required");
                        return;
                      }

                      const workflowFile = "discord-commit.yml";

                      await github.rest.actions.createWorkflowDispatch({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        workflow_id: workflowFile,
                        ref: "main", // use latest workflow from main
                        inputs: { sha }
                      });

                      core.info(`Dispatched ${workflowFile} on ref=main with sha=${sha}`);
