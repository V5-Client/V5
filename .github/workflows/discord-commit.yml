name: Send Commit Message to Discord

on:
    push:
        branches:
            - '**'
    workflow_dispatch:
        inputs:
            sha:
                description: 'Commit SHA to run against (optional).'
                required: false
                type: string

jobs:
    notify-discord:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repo
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ inputs.sha || github.sha }}

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Cache global npm
              uses: actions/cache@v4
              with:
                  path: ~/.npm
                  key: npm-global-${{ runner.os }}
                  restore-keys: |
                      npm-global-${{ runner.os }}

            - name: Install latest Wrangler
              run: npm install -g wrangler@latest --prefer-offline

            - name: Prepare Data
              shell: bash
              run: |
                  set -euo pipefail

                  HEAD_SHA="$(git rev-parse HEAD)"
                  echo "HEAD_SHA=$HEAD_SHA" >> "$GITHUB_ENV"
                  echo "COMMIT_URL=https://github.com/${GITHUB_REPOSITORY}/commit/${HEAD_SHA}" >> "$GITHUB_ENV"
                  echo "TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_ENV"
                  echo "BRANCH=${GITHUB_REF#refs/heads/}" >> "$GITHUB_ENV"
                  echo "REPO_FULL=${GITHUB_REPOSITORY}" >> "$GITHUB_ENV"
                  echo "REPO_NAME=${GITHUB_REPOSITORY#*/}" >> "$GITHUB_ENV"

                  declare -A USERS=(
                    ["EpsilonPhoenix"]="<@899647076370092042>"
                    ["qxionr"]="<@790294721943699477>"
                    ["quiteboring"]="<@1441859003708866601>"
                    ["rdbtCVS"]="<@777346923232886784>"
                    ["IcyHenryT"]="<@1160548899711356958>"
                    ["oblongboot"]="<@768481984242253904>"
                    ["axlecoffee"]="<@790736254714642453>"
                  )

                  ACTOR="$(git log -1 --pretty=%an)"
                  echo "DISCORD_AUTHOR=${USERS[$ACTOR]:-$ACTOR}" >> "$GITHUB_ENV"

                  BASE_SHA="$(git rev-parse "${HEAD_SHA}^" 2>/dev/null || echo "4b825dc642cb6eb9a060e54bf8d69288fbee4904")"

                  STATS="$(git diff --shortstat "$BASE_SHA" "$HEAD_SHA" || echo "0 files changed")"
                  echo "STATS_TEXT=$STATS" >> "$GITHUB_ENV"

                  EXT_LIST="$(
                    git diff --name-only "$BASE_SHA" "$HEAD_SHA" | awk '
                      {
                        f=$0
                        n=split(f,a,"/")
                        b=a[n]
                        if (index(b,".")==0) ext="noext"
                        else { ext=b; sub(/^.*\./,"",ext) }
                        print ext
                      }
                    ' | sort | uniq -c | sort -nr | head -n 10 \
                      | awk '{print $2 " (" $1 ")"}' \
                      | paste -sd ", " -
                  )"
                  [[ -z "${EXT_LIST:-}" ]] && EXT_LIST="No specific types"
                  EXT_LIST="${EXT_LIST:0:1024}"
                  echo "FILE_TYPES=$EXT_LIST" >> "$GITHUB_ENV"

            - name: Build channel ZIPs
              if: ${{ endsWith(github.repository, '/V5') }}
              shell: bash
              run: |
                  set -euo pipefail

                  strip_channel() {
                    local dir="$1"
                    local channel="$2"

                    find "$dir" -name '*.js' -type f -print0 | while IFS= read -r -d '' file; do
                      first_line="$(head -n 1 "$file" || true)"
                      case "$first_line" in
                        '//@Beta')
                          if [[ "$channel" != "Beta" ]]; then
                            truncate -s 0 "$file"
                          else
                            sed -i '1d' "$file"
                          fi
                          ;;
                        '//@VIP')
                          if [[ "$channel" == "Release" ]]; then
                            truncate -s 0 "$file"
                          else
                            sed -i '1d' "$file"
                          fi
                          ;;
                        '//@Private')
                          truncate -s 0 "$file"
                          ;;
                      esac
                    done
                  }

                  minify_channel_js() {
                    local dir="$1"
                    find "$dir" -name '*.js' -type f -print0 | while IFS= read -r -d '' file; do
                      node - "$file" <<'NODE'
                  const fs = require('fs');
                  const file = process.argv[2];
                  const src = fs.readFileSync(file, 'utf8');

                  function isWordChar(ch) {
                    return /[A-Za-z0-9_$]/.test(ch);
                  }

                  function isRegexAllowed(lastToken) {
                    if (!lastToken) return true;
                    if (lastToken.type === 'word') {
                      return new Set([
                        'return',
                        'throw',
                        'case',
                        'delete',
                        'void',
                        'typeof',
                        'instanceof',
                        'in',
                        'of',
                        'new',
                        'do',
                        'else',
                        'yield',
                        'await',
                      ]).has(lastToken.value);
                    }
                    return /[({[=,:;!?&|+\-*%^~<>]/.test(lastToken.value);
                  }

                  function stripComments(input) {
                    let out = '';
                    let i = 0;
                    let state = 'code';
                    let escape = false;
                    let inRegexClass = false;
                    let word = '';
                    let lastToken = { type: 'char', value: ';' };

                    function flushWord() {
                      if (!word) return;
                      lastToken = { type: 'word', value: word };
                      word = '';
                    }

                    while (i < input.length) {
                      const ch = input[i];
                      const nx = i + 1 < input.length ? input[i + 1] : '';

                      if (state === 'line_comment') {
                        if (ch === '\n') {
                          out += '\n';
                          state = 'code';
                        }
                        i += 1;
                        continue;
                      }

                      if (state === 'block_comment') {
                        if (ch === '\n') out += '\n';
                        if (ch === '*' && nx === '/') {
                          state = 'code';
                          i += 2;
                        } else {
                          i += 1;
                        }
                        continue;
                      }

                      if (state === 'single' || state === 'double' || state === 'template') {
                        out += ch;
                        if (escape) {
                          escape = false;
                        } else if (ch === '\\') {
                          escape = true;
                        } else if (
                          (state === 'single' && ch === "'") ||
                          (state === 'double' && ch === '"') ||
                          (state === 'template' && ch === '`')
                        ) {
                          state = 'code';
                          lastToken = { type: 'char', value: 'L' };
                        }
                        i += 1;
                        continue;
                      }

                      if (state === 'regex') {
                        out += ch;
                        if (escape) {
                          escape = false;
                        } else if (ch === '\\') {
                          escape = true;
                        } else if (ch === '[') {
                          inRegexClass = true;
                        } else if (ch === ']' && inRegexClass) {
                          inRegexClass = false;
                        } else if (ch === '/' && !inRegexClass) {
                          state = 'code';
                          lastToken = { type: 'char', value: '/' };
                        }
                        i += 1;
                        continue;
                      }

                      if (isWordChar(ch)) {
                        out += ch;
                        word += ch;
                        i += 1;
                        continue;
                      }

                      flushWord();

                      if (ch === '/' && nx === '/') {
                        state = 'line_comment';
                        i += 2;
                        continue;
                      }

                      if (ch === '/' && nx === '*') {
                        state = 'block_comment';
                        i += 2;
                        continue;
                      }

                      if (ch === '/') {
                        if (isRegexAllowed(lastToken)) {
                          out += ch;
                          state = 'regex';
                        } else {
                          out += ch;
                          lastToken = { type: 'char', value: '/' };
                        }
                        i += 1;
                        continue;
                      }

                      if (ch === "'") {
                        out += ch;
                        state = 'single';
                        i += 1;
                        continue;
                      }
                      if (ch === '"') {
                        out += ch;
                        state = 'double';
                        i += 1;
                        continue;
                      }
                      if (ch === '`') {
                        out += ch;
                        state = 'template';
                        i += 1;
                        continue;
                      }

                      out += ch;
                      if (!/\s/.test(ch)) {
                        lastToken = { type: 'char', value: ch };
                      }
                      i += 1;
                    }

                    flushWord();
                    return out;
                  }

                  const stripped = stripComments(src);
                  const compact = stripped
                    .split(/\r?\n/)
                    .map((line) => line.trim())
                    .filter((line) => line.length > 0)
                    .join('\n');

                  fs.writeFileSync(file, compact ? `${compact}\n` : '', 'utf8');
                  NODE
                    done
                  }

                  workdir="$(mktemp -d)"
                  trap 'rm -rf "$workdir"' EXIT

                  source_dir="$workdir/source"
                  mkdir -p "$source_dir"

                  cp -a . "$source_dir"/
                  rm -rf "$source_dir/.git" "$source_dir/.github" "$source_dir/.vscode"
                  rm -f "$source_dir/README.md" "$source_dir/.gitignore"

                  for channel in Release VIP Beta; do
                    build_dir="$workdir/$channel"
                    mkdir -p "$build_dir"
                    cp -a "$source_dir"/. "$build_dir"/
                    strip_channel "$build_dir" "$channel"
                    minify_channel_js "$build_dir"
                    (
                      cd "$build_dir"
                      zip -qr "$GITHUB_WORKSPACE/V5-$channel.zip" .
                    )
                  done

            - name: Upload Release zip to R2
              if: ${{ endsWith(github.repository, '/V5') && github.ref == 'refs/heads/main' }}
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
              run: |
                  wrangler r2 object put v5-builds/V5-Release.zip --file V5-Release.zip --remote

            - name: Upload VIP zip to R2
              if: ${{ endsWith(github.repository, '/V5') && github.ref == 'refs/heads/main' }}
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
              run: |
                  wrangler r2 object put v5-builds/V5-VIP.zip --file V5-VIP.zip --remote

            - name: Upload Beta zip to R2
              if: ${{ endsWith(github.repository, '/V5') && github.ref == 'refs/heads/main' }}
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
              run: |
                  wrangler r2 object put v5-builds/V5-Beta.zip --file V5-Beta.zip --remote

            - name: Send to Discord
              env:
                  WEBHOOK: ${{ secrets.PUSH_NOTIFIER }}
              shell: bash
              run: |
                  set -euo pipefail

                  COMMIT_MSG="$(git log -1 --pretty=%B)"
                  export CHUNK_LIMIT=3500
                  export COMMIT_MSG

                  mapfile -d '' MSG_CHUNKS < <(
                    python3 - << 'PY'
                  import os
                  import sys

                  s = os.environ.get("COMMIT_MSG", "")
                  limit = int(os.environ.get("CHUNK_LIMIT", "3500"))

                  if not s:
                      sys.stdout.write("No commit message.\0")
                      sys.exit(0)

                  start = 0
                  s_len = len(s)

                  while start < s_len:
                      end = start + limit
                      if end >= s_len:
                          sys.stdout.write(s[start:] + '\0')
                          break

                      chunk = s[start:end]
                      last_newline = chunk.rfind('\n')

                      if last_newline != -1:
                          cut_point = last_newline + 1
                      else:
                          cut_point = limit

                      sys.stdout.write(chunk[:cut_point] + '\0')
                      start += cut_point
                  PY
                  )

                  if [[ "${#MSG_CHUNKS[@]}" -eq 0 ]]; then
                    MSG_CHUNKS=("No commit message.")
                  fi

                  TOTAL="${#MSG_CHUNKS[@]}"

                  FIRST_MSG="${MSG_CHUNKS[0]}"

                  PAYLOAD="$(jq -cn \
                    --arg msg "$FIRST_MSG" \
                    --arg url "$COMMIT_URL" \
                    --arg author "$DISCORD_AUTHOR" \
                    --arg branch "$BRANCH" \
                    --arg time "$TIMESTAMP" \
                    --arg stats "$STATS_TEXT" \
                    --arg types "$FILE_TYPES" \
                    --arg repo "$REPO_NAME" \
                    --arg repofull "$REPO_FULL" \
                    --arg idx "1" \
                    --arg total "$TOTAL" \
                    '{
                      username: ($repo + " Commits"),
                      avatar_url: "https://p7.hiclipart.com/preview/227/12/28/catgirl-anime-kawaii-manga-cat.jpg",
                      embeds: [{
                        title: ("[" + $repo + "] New Commit" + (if ($total|tonumber) > 1 then " (" + $idx + "/" + $total + ")" else "" end)),
                        description: ("📝 **Summary**\n" + $msg + "\n\n[View Commit](" + $url + ")"),
                        color: 3447003,
                        timestamp: $time,
                        fields: [
                          {name: "Repository", value: $repofull, inline: true},
                          {name: "Author", value: $author, inline: true},
                          {name: "Branch", value: $branch, inline: true},
                          {name: "📊 Changes", value: $stats, inline: false},
                          {name: "📂 File Types", value: $types, inline: false}
                        ]
                      }]
                    }'
                  )"

                  curl -sS --fail-with-body \
                    -H "Content-Type: application/json" \
                    -d "$PAYLOAD" \
                    "$WEBHOOK"

                  for ((i = 1; i < TOTAL; i++)); do
                    PART="${MSG_CHUNKS[$i]}"
                    IDX="$((i+1))"

                    CONT_PAYLOAD="$(jq -cn \
                      --arg msg "$PART" \
                      --arg url "$COMMIT_URL" \
                      --arg time "$TIMESTAMP" \
                      --arg repo "$REPO_NAME" \
                      --arg repofull "$REPO_FULL" \
                      --arg idx "$IDX" \
                      --arg total "$TOTAL" \
                      '{
                        username: ($repo + " Commits"),
                        avatar_url: "https://p7.hiclipart.com/preview/227/12/28/catgirl-anime-kawaii-manga-cat.jpg",
                        embeds: [{
                          title: ("[" + $repo + "] New Commit (continued " + $idx + "/" + $total + ")"),
                          description: ($msg + "\n\n[View Commit](" + $url + ")"),
                          color: 3447003,
                          timestamp: $time,
                          fields: [
                            {name: "Repository", value: $repofull, inline: true}
                          ]
                        }]
                      }'
                    )"

                    curl -sS --fail-with-body \
                      -H "Content-Type: application/json" \
                      -d "$CONT_PAYLOAD" \
                      "$WEBHOOK"
                  done
