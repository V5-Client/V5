name: Send Commit Message to Discord

on:
    push:
        branches:
            - '**'

jobs:
    notify-discord:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4
              with:
                  fetch-depth: 2

            - name: Get commit info
              id: commit
              run: |
                  COMMIT_MESSAGE=$(git log -1 --pretty=%B)
                  AUTHOR_NAME=$(git log -1 --pretty=%an)
                  AUTHOR_LOGIN="${{ github.actor }}"
                  BRANCH_NAME="${GITHUB_REF#refs/heads/}"
                  TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

                  if [ "$(git rev-list --count HEAD)" -eq 1 ]; then
                    ADDED=$(git show --shortstat HEAD | grep -oE '[0-9]+ insert' | grep -oE '[0-9]+' || echo 0)
                    DELETED=$(git show --shortstat HEAD | grep -oE '[0-9]+ delet' | grep -oE '[0-9]+' || echo 0)
                    MODIFIED=$(git show --shortstat HEAD | grep -oE '[0-9]+ file' | grep -oE '[0-9]+' || echo 0)
                    FILES=$(git show --pretty="" --name-only HEAD)
                  else
                    ADDED=$(git diff --shortstat HEAD~1 HEAD | grep -oE '[0-9]+ insert' | grep -oE '[0-9]+' || echo 0)
                    DELETED=$(git diff --shortstat HEAD~1 HEAD | grep -oE '[0-9]+ delet' | grep -oE '[0-9]+' || echo 0)
                    MODIFIED=$(git diff --shortstat HEAD~1 HEAD | grep -oE '[0-9]+ file' | grep -oE '[0-9]+' || echo 0)
                    FILES=$(git diff --name-only HEAD~1 HEAD)
                  fi

                  declare -A LANG_MAP=(
                    ["js"]="JavaScript"
                    ["ts"]="TypeScript"
                    ["json"]="JSON"
                    ["yaml"]="YAML"
                    ["yml"]="YAML"
                    ["py"]="Python"
                    ["java"]="Java"
                    ["kt"]="Kotlin"
                    ["c"]="C"
                    ["cpp"]="C++"
                    ["cs"]="C#"
                    ["rb"]="Ruby"
                    ["go"]="Go"
                    ["rs"]="Rust"
                    ["html"]="HTML"
                    ["css"]="CSS"
                  )

                  FILETYPES=$(echo "$FILES" | awk -F. 'NF>1 {print $NF}' | sort | uniq -c | awk '{print $1, $2}')

                  FILETYPES_TEXT=""
                  while read -r count ext; do
                    [ -z "$ext" ] && continue
                    lang="${LANG_MAP[$ext]:-$ext}"
                    FILETYPES_TEXT+="$lang ($count)\n"
                  done <<< "$FILETYPES"

                  FILETYPES_TEXT=$(echo -e "$FILETYPES_TEXT" | sed '/^$/d')

                  SUMMARY=$(echo -e "📝 Summary\n$COMMIT_MESSAGE\n\n📊 Files Changed\n+${ADDED} added\n~${MODIFIED} modified\n-${DELETED} deleted\n\n📂 File Types\n$FILETYPES_TEXT")

                  {
                    echo "message<<EOF" >> $GITHUB_OUTPUT
                    echo "$SUMMARY" >> $GITHUB_OUTPUT
                    echo "EOF" >> $GITHUB_OUTPUT
                    echo "author=$AUTHOR_NAME" >> $GITHUB_OUTPUT
                    echo "login=$AUTHOR_LOGIN" >> $GITHUB_OUTPUT
                    echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT
                    echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
                  }

            - name: Map GitHub user -> Discord username
              id: mapuser
              run: |
                  declare -A USER_MAP=(
                    ["WaterPheonix196"]="<@899647076370092042>"
                    ["qxionr"]="<@790294721943699477>"
                    ["quiteboringv2"]="<@1367543367277219840>"
                    ["rdbtCVS"]="<@777346923232886784>"
                    ["IcyHenryT"]="<@1160548899711356958>"
                  )

                  GH_USER="${{ steps.commit.outputs.login }}"
                  DISCORD_USER="${USER_MAP[$GH_USER]:-$GH_USER}"
                  echo "discord=$DISCORD_USER" >> $GITHUB_OUTPUT

            - name: Send message to Discord
              run: |
                  safe_message=$(echo "${{ steps.commit.outputs.message }}" | jq -Rs .)

                  payload=$(jq -n \
                    --arg username "V5 Commits" \
                    --arg avatar_url "https://cdn.donmai.us/sample/bb/4d/__os_tan_and_2_more_drawn_by_raviolimavioli__sample-bb4d90d601466faa9ff6bc816869a25d.jpg" \
                    --arg title "New Commit" \
                    --argjson description "$safe_message" \
                    --arg author "${{ steps.mapuser.outputs.discord }}" \
                    --arg branch "${{ steps.commit.outputs.branch }}" \
                    --argjson color 3447003 \
                    '{
                      "username": $username,
                      "avatar_url": $avatar_url,
                      "embeds": [
                        {
                          "title": $title,
                          "description": $description,
                          "color": $color,
                          "fields": [
                            {"name": "Author", "value": $author, "inline": true},
                            {"name": "Branch", "value": $branch, "inline": true}
                          ],
                          "timestamp": "'${{ steps.commit.outputs.timestamp }}'"
                        }
                      ]
                    }')

                  curl -X POST -H "Content-Type: application/json" \
                       -d "$payload" \
                       "${{ secrets.PUSH_NOTIFIER }}"
