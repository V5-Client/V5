name: Send Commit Message to Discord

on:
    push:
        branches:
            - '**'
    workflow_dispatch:
        inputs:
            sha:
                description: 'Commit SHA to run against (optional).'
                required: false
                type: string

jobs:
    notify-discord:
        runs-on: blacksmith-2vcpu-ubuntu-2404

        steps:
            - name: Checkout repo
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ inputs.sha || github.sha }}

            - name: Prepare Data
              shell: bash
              run: |
                  set -euo pipefail

                  HEAD_SHA="$(git rev-parse HEAD)"
                  echo "HEAD_SHA=$HEAD_SHA" >> "$GITHUB_ENV"
                  echo "COMMIT_URL=https://github.com/${GITHUB_REPOSITORY}/commit/${HEAD_SHA}" >> "$GITHUB_ENV"
                  echo "TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_ENV"
                  echo "BRANCH=${GITHUB_REF#refs/heads/}" >> "$GITHUB_ENV"

                  # Defaults for Zip logic (in case zip step is skipped)
                  echo "ZIP_READY=false" >> "$GITHUB_ENV"
                  echo "ZIP_WARNING=" >> "$GITHUB_ENV"

                  declare -A USERS=(
                    ["EpsilonPhoenix"]="<@899647076370092042>"
                    ["qxionr"]="<@790294721943699477>"
                    ["quiteboring"]="<@1441859003708866601>"
                    ["rdbtCVS"]="<@777346923232886784>"
                    ["IcyHenryT"]="<@1160548899711356958>"
                    ["oblongboot"]="<@768481984242253904>"
                    ["axlecoffee"]="<@790736254714642453>"
                  )

                  ACTOR="$(git log -1 --pretty=%an)"
                  echo "DISCORD_AUTHOR=${USERS[$ACTOR]:-$ACTOR}" >> "$GITHUB_ENV"

                  BASE_SHA="$(git rev-parse "${HEAD_SHA}^" 2>/dev/null || echo "4b825dc642cb6eb9a060e54bf8d69288fbee4904")"

                  STATS="$(git diff --shortstat "$BASE_SHA" "$HEAD_SHA" || echo "0 files changed")"
                  echo "STATS_TEXT=$STATS" >> "$GITHUB_ENV"

                  EXT_LIST="$(
                    git diff --name-only "$BASE_SHA" "$HEAD_SHA" | awk '
                      {
                        f=$0
                        n=split(f,a,"/")
                        b=a[n]
                        if (index(b,".")==0) ext="noext"
                        else { ext=b; sub(/^.*\./,"",ext) }
                        print ext
                      }
                    ' | sort | uniq -c | sort -nr | head -n 10 \
                      | awk '{print $2 " (" $1 ")"}' \
                      | paste -sd ", " -
                  )"
                  [[ -z "${EXT_LIST:-}" ]] && EXT_LIST="No specific types"
                  EXT_LIST="${EXT_LIST:0:1024}"
                  echo "FILE_TYPES=$EXT_LIST" >> "$GITHUB_ENV"

            - name: Zip repository
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              shell: bash
              run: |
                  set -euo pipefail
                  zip -r V5.zip . -x ".git/*" ".github/*" ".vscode/*" "README.md" ".gitignore"

                  # Check size (8MB limit = 8388608 bytes)
                  SIZE=$(stat -c%s V5.zip)
                  MAX_SIZE=8388608

                  if (( SIZE > MAX_SIZE )); then
                     echo "ZIP_READY=false" >> "$GITHUB_ENV"
                     echo "ZIP_WARNING=\n\n⚠️ **Zip artifact too large to send (>8MB).**" >> "$GITHUB_ENV"
                  else
                     echo "ZIP_READY=true" >> "$GITHUB_ENV"
                  fi

            - name: Send to Discord
              env:
                  WEBHOOK: ${{ secrets.PUSH_NOTIFIER }}
              shell: bash
              run: |
                  set -euo pipefail

                  COMMIT_MSG="$(git log -1 --pretty=%B)"
                  export CHUNK_LIMIT=3500
                  export COMMIT_MSG

                  # Split Logic: Split by chars, but backtrack to the nearest newline
                  # to ensure we don't cut words in half, unless the line is massive.
                  mapfile -d '' MSG_CHUNKS < <(
                    python3 - << 'PY'
                  import os
                  import sys

                  s = os.environ.get("COMMIT_MSG", "")
                  limit = int(os.environ.get("CHUNK_LIMIT", "3500"))

                  if not s:
                      sys.stdout.write("No commit message.\0")
                      sys.exit(0)

                  start = 0
                  s_len = len(s)

                  while start < s_len:
                      # Define the potential hard cutoff point
                      end = start + limit

                      # If we can fit the rest, just print it
                      if end >= s_len:
                          sys.stdout.write(s[start:] + '\0')
                          break

                      # Get the chunk up to the limit
                      chunk = s[start:end]

                      # Find the last newline in this chunk
                      last_newline = chunk.rfind('\n')

                      if last_newline != -1:
                          # If newline found, split there (include newline in current chunk)
                          cut_point = last_newline + 1
                      else:
                          # If NO newline found (a massive single line), hard split at limit
                          cut_point = limit

                      # Write the sub-chunk + Null byte
                      sys.stdout.write(chunk[:cut_point] + '\0')
                      
                      # Advance start
                      start += cut_point
                  PY
                  )

                  if [[ "${#MSG_CHUNKS[@]}" -eq 0 ]]; then
                    MSG_CHUNKS=("No commit message.")
                  fi

                  TOTAL="${#MSG_CHUNKS[@]}"

                  # ---- First message: embed + optional zip ----
                  FIRST_MSG="${MSG_CHUNKS[0]}"

                  # Pass ZIP_WARNING to jq. It defaults to empty string if zip is okay/missing.
                  PAYLOAD="$(jq -cn \
                    --arg msg "$FIRST_MSG" \
                    --arg url "$COMMIT_URL" \
                    --arg author "$DISCORD_AUTHOR" \
                    --arg branch "$BRANCH" \
                    --arg time "$TIMESTAMP" \
                    --arg stats "$STATS_TEXT" \
                    --arg types "$FILE_TYPES" \
                    --arg idx "1" \
                    --arg total "$TOTAL" \
                    --arg warn "$ZIP_WARNING" \
                    '{
                      username: "V5 Commits",
                      avatar_url: "https://p7.hiclipart.com/preview/227/12/28/catgirl-anime-kawaii-manga-cat.jpg",
                      embeds: [{
                        title: ("New Commit" + (if ($total|tonumber) > 1 then " (" + $idx + "/" + $total + ")" else "" end)),
                        description: ("📝 **Summary**\n" + $msg + $warn + "\n\n[View Commit](" + $url + ")"),
                        color: 3447003,
                        timestamp: $time,
                        fields: [
                          {name: "Author", value: $author, inline: true},
                          {name: "Branch", value: $branch, inline: true},
                          {name: "📊 Changes", value: $stats, inline: false},
                          {name: "📂 File Types", value: $types, inline: false}
                        ]
                      }]
                    }'
                  )"

                    CURL_ARGS=(--form-string "payload_json=$PAYLOAD")

                    if [[ "${ZIP_READY}" == "true" ]]; then
                        CURL_ARGS+=(-F "files[0]=@V5.zip;filename=V5.zip")
                    fi

                    curl -sS --fail-with-body "${CURL_ARGS[@]}" "$WEBHOOK"


                  # ---- Continuations: embeds only ----
                  for ((i = 1; i < TOTAL; i++)); do
                    PART="${MSG_CHUNKS[$i]}"
                    IDX="$((i+1))"

                    CONT_PAYLOAD="$(jq -cn \
                      --arg msg "$PART" \
                      --arg url "$COMMIT_URL" \
                      --arg time "$TIMESTAMP" \
                      --arg idx "$IDX" \
                      --arg total "$TOTAL" \
                      '{
                        username: "V5 Commits",
                        avatar_url: "https://p7.hiclipart.com/preview/227/12/28/catgirl-anime-kawaii-manga-cat.jpg",
                        embeds: [{
                          title: ("New Commit (continued " + $idx + "/" + $total + ")"),
                          description: ($msg + "\n\n[View Commit](" + $url + ")"),
                          color: 3447003,
                          timestamp: $time
                        }]
                      }'
                    )"

                    curl -sS --fail-with-body \
                      -H "Content-Type: application/json" \
                      -d "$CONT_PAYLOAD" \
                      "$WEBHOOK"
                  done
