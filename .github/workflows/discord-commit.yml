name: Send Commit Message to Discord

on:
    push:
        branches:
            - '**'

jobs:
    notify-discord:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repo
              uses: actions/checkout@v4
              with:
                  fetch-depth: 2

            - name: Get commit info
              id: commit
              shell: bash
              run: |
                  set -euo pipefail

                  COMMIT_MESSAGE=$(git log -1 --pretty=%B)
                  AUTHOR_NAME=$(git log -1 --pretty=%an)
                  AUTHOR_LOGIN="${{ github.actor }}"
                  BRANCH_NAME="${GITHUB_REF#refs/heads/}"
                  TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

                  if [ "$(git rev-list --count HEAD)" -eq 1 ]; then
                    BASE=""
                  else
                    BASE="HEAD~1"
                  fi

                  if [ -z "$BASE" ]; then
                    STATS=$(git show --shortstat HEAD | tail -n 1 || true)
                    FILES=$(git show --pretty="" --name-only HEAD || true)
                  else
                    STATS=$(git diff --shortstat "$BASE" HEAD || true)
                    FILES=$(git diff --name-only "$BASE" HEAD || true)
                  fi

                  ADDED=$(echo "$STATS" | grep -oE '[0-9]+ insert' | grep -oE '[0-9]+' || echo 0)
                  DELETED=$(echo "$STATS" | grep -oE '[0-9]+ delet' | grep -oE '[0-9]+' || echo 0)
                  FILES_CHANGED=$(echo "$STATS" | grep -oE '[0-9]+ file' | grep -oE '[0-9]+' || echo 0)

                  declare -A LANG_MAP=(
                    ["js"]="JavaScript" ["ts"]="TypeScript" ["json"]="JSON"
                    ["yaml"]="YAML" ["yml"]="YAML" ["py"]="Python"
                    ["java"]="Java" ["kt"]="Kotlin" ["c"]="C"
                    ["cpp"]="C++" ["cs"]="C#" ["rb"]="Ruby"
                    ["go"]="Go" ["rs"]="Rust" ["html"]="HTML" ["css"]="CSS"
                  )

                  FILETYPES=$(echo "$FILES" | awk -F. 'NF>1 {print $NF}' | sort | uniq -c)
                  FILETYPES_TEXT=""
                  while read -r count ext; do
                    [ -z "${ext:-}" ] && continue
                    lang="${LANG_MAP[$ext]:-$ext}"
                    FILETYPES_TEXT+="$lang ($count)\n"
                  done <<< "$FILETYPES"

                  {
                    echo "message<<EOF"
                    echo "$COMMIT_MESSAGE"
                    echo "EOF"
                    echo "author=$AUTHOR_NAME"
                    echo "login=$AUTHOR_LOGIN"
                    echo "branch=$BRANCH_NAME"
                    echo "timestamp=$TIMESTAMP"
                    echo "added=$ADDED"
                    echo "deleted=$DELETED"
                    echo "files_changed=$FILES_CHANGED"
                    echo "filetypes<<EOF"
                    echo -e "$FILETYPES_TEXT"
                    echo "EOF"
                    echo "commit_url=${{ github.event.head_commit.url }}"
                  } >> "$GITHUB_OUTPUT"

            - name: Map GitHub user -> Discord username
              id: mapuser
              shell: bash
              run: |
                  declare -A USER_MAP=(
                    ["EpsilonPhoenix"]="<@899647076370092042>"
                    ["qxionr"]="<@790294721943699477>"
                    ["quiteboring"]="<@1441859003708866601>"
                    ["rdbtCVS"]="<@777346923232886784>"
                    ["IcyHenryT"]="<@1160548899711356958>"
                    ["oblongboot"]="<@768481984242253904>"
                    ["axlecoffee"]="<@790736254714642453>"
                  )

                  GH_USER="${{ steps.commit.outputs.login }}"
                  DISCORD_USER="${USER_MAP[$GH_USER]:-$GH_USER}"
                  echo "discord=$DISCORD_USER" >> "$GITHUB_OUTPUT"

            # ZIP ONLY ON MAIN
            - name: Zip repository (main only)
              if: github.ref == 'refs/heads/main'
              run: |
                  zip -r V5.zip . \
                    -x ".git/*" \
                    -x ".git/**"

            # MAIN BRANCH: EMBED + ZIP
            - name: Send Discord message (main + zip)
              if: github.ref == 'refs/heads/main'
              env:
                  DISCORD_WEBHOOK_URL: ${{ secrets.PUSH_NOTIFIER }}
                  COMMIT_MESSAGE: ${{ steps.commit.outputs.message }}
                  DISCORD_USER: ${{ steps.mapuser.outputs.discord }}
                  BRANCH_NAME: ${{ steps.commit.outputs.branch }}
                  TIMESTAMP: ${{ steps.commit.outputs.timestamp }}
                  ADDED: ${{ steps.commit.outputs.added }}
                  DELETED: ${{ steps.commit.outputs.deleted }}
                  FILES_CHANGED: ${{ steps.commit.outputs.files_changed }}
                  FILE_TYPES: ${{ steps.commit.outputs.filetypes }}
                  COMMIT_URL: ${{ steps.commit.outputs.commit_url }}
              run: |
                  payload=$(jq -n \
                    --arg username "V5 Commits" \
                    --arg title "New Commit" \
                    --arg description "$COMMIT_MESSAGE" \
                    --arg author "$DISCORD_USER" \
                    --arg branch "$BRANCH_NAME" \
                    --arg timestamp "$TIMESTAMP" \
                    --arg commit_url "$COMMIT_URL" \
                    --arg added "$ADDED" \
                    --arg deleted "$DELETED" \
                    --arg files_changed "$FILES_CHANGED" \
                    --arg filetypes "$FILE_TYPES" \
                    --argjson color 3447003 \
                    '{
                      "username": $username,
                      "embeds": [{
                        "title": $title,
                        "description": ("📝 Summary\n" + $description + "\n\n[View Commit](" + $commit_url + ")"),
                        "color": $color,
                        "fields": [
                          {"name": "Author", "value": $author, "inline": true},
                          {"name": "Branch", "value": $branch, "inline": true},
                          {"name": "📂 Files Changed", "value": (($files_changed + " files changed") + "\n" + $filetypes), "inline": false},
                          {"name": "📊 Code Line Changes", "value": ("+" + $added + " added\n-" + $deleted + " deleted"), "inline": false}
                        ],
                        "timestamp": $timestamp
                      }]
                    }')

                  curl -X POST "$DISCORD_WEBHOOK_URL" \
                    -F "payload_json=$payload" \
                    -F "file=@V5.zip"

            # NON-MAIN: EMBED ONLY
            - name: Send Discord message (non-main)
              if: github.ref != 'refs/heads/main'
              env:
                  DISCORD_WEBHOOK_URL: ${{ secrets.PUSH_NOTIFIER }}
                  COMMIT_MESSAGE: ${{ steps.commit.outputs.message }}
                  DISCORD_USER: ${{ steps.mapuser.outputs.discord }}
                  BRANCH_NAME: ${{ steps.commit.outputs.branch }}
                  TIMESTAMP: ${{ steps.commit.outputs.timestamp }}
                  ADDED: ${{ steps.commit.outputs.added }}
                  DELETED: ${{ steps.commit.outputs.deleted }}
                  FILES_CHANGED: ${{ steps.commit.outputs.files_changed }}
                  FILE_TYPES: ${{ steps.commit.outputs.filetypes }}
                  COMMIT_URL: ${{ steps.commit.outputs.commit_url }}
              run: |
                  payload=$(jq -n \
                    --arg username "V5 Commits" \
                    --arg title "New Commit" \
                    --arg description "$COMMIT_MESSAGE" \
                    --arg author "$DISCORD_USER" \
                    --arg branch "$BRANCH_NAME" \
                    --arg timestamp "$TIMESTAMP" \
                    --arg commit_url "$COMMIT_URL" \
                    --arg added "$ADDED" \
                    --arg deleted "$DELETED" \
                    --arg files_changed "$FILES_CHANGED" \
                    --arg filetypes "$FILE_TYPES" \
                    --argjson color 3447003 \
                    '{
                      "username": $username,
                      "embeds": [{
                        "title": $title,
                        "description": ("📝 Summary\n" + $description + "\n\n[View Commit](" + $commit_url + ")"),
                        "color": $color,
                        "fields": [
                          {"name": "Author", "value": $author, "inline": true},
                          {"name": "Branch", "value": $branch, "inline": true},
                          {"name": "📂 Files Changed", "value": (($files_changed + " files changed") + "\n" + $filetypes), "inline": false},
                          {"name": "📊 Code Line Changes", "value": ("+" + $added + " added\n-" + $deleted + " deleted"), "inline": false}
                        ],
                        "timestamp": $timestamp
                      }]
                    }')

                  curl -X POST -H "Content-Type: application/json" \
                       -d "$payload" \
                       "$DISCORD_WEBHOOK_URL"
