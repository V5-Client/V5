name: Send Commit Message to Discord

on:
    push:
        branches:
            - '**'
    workflow_dispatch:
        inputs:
            sha:
                description: 'Commit SHA to run against (optional). If set, workflow checks out this commit.'
                required: false
                type: string

jobs:
    notify-discord:
        runs-on: blacksmith-2vcpu-ubuntu-2404

        steps:
            - name: Checkout repo
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ inputs.sha || github.sha }}

            - name: Prepare Data
              shell: bash
              run: |
                  set -euo pipefail

                  HEAD_SHA="$(git rev-parse HEAD)"
                  echo "HEAD_SHA=$HEAD_SHA" >> "$GITHUB_ENV"

                  echo "COMMIT_URL=https://github.com/${GITHUB_REPOSITORY}/commit/${HEAD_SHA}" >> "$GITHUB_ENV"
                  echo "TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_ENV"

                  # For push: actual branch. For workflow_dispatch: the branch you clicked "Run workflow" on.
                  echo "BRANCH=${GITHUB_REF#refs/heads/}" >> "$GITHUB_ENV"

                  echo "ZIP_EXISTS=false" >> "$GITHUB_ENV"

                  declare -A USERS=(
                    ["EpsilonPhoenix"]="<@899647076370092042>"
                    ["qxionr"]="<@790294721943699477>"
                    ["quiteboring"]="<@1441859003708866601>"
                    ["rdbtCVS"]="<@777346923232886784>"
                    ["IcyHenryT"]="<@1160548899711356958>"
                    ["oblongboot"]="<@768481984242253904>"
                    ["axlecoffee"]="<@790736254714642453>"
                  )

                  # Use the commit author name (not the runner actor)
                  ACTOR="$(git log -1 --pretty=%an)"
                  echo "DISCORD_AUTHOR=${USERS[$ACTOR]:-$ACTOR}" >> "$GITHUB_ENV"

                  # Diff against parent commit (or empty tree for root commit)
                  BASE_SHA="$(git rev-parse "${HEAD_SHA}^" 2>/dev/null || echo "4b825dc642cb6eb9a060e54bf8d69288fbee4904")"

                  STATS="$(git diff --shortstat "$BASE_SHA" "$HEAD_SHA" || echo "0 files changed")"
                  echo "STATS_TEXT=$STATS" >> "$GITHUB_ENV"

                  EXT_LIST="$(
                    git diff --name-only "$BASE_SHA" "$HEAD_SHA" | awk '
                      {
                        f=$0
                        n=split(f,a,"/")
                        b=a[n]
                        if (index(b,".")==0) ext="noext"
                        else { ext=b; sub(/^.*\./,"",ext) }
                        print ext
                      }
                    ' | sort | uniq -c | sort -nr | head -n 10 \
                      | awk '{print $2 " (" $1 ")"}' \
                      | paste -sd ", " -
                  )"
                  [[ -z "${EXT_LIST:-}" ]] && EXT_LIST="No specific types"
                  EXT_LIST="${EXT_LIST:0:1024}"
                  echo "FILE_TYPES=$EXT_LIST" >> "$GITHUB_ENV"

            - name: Zip repository
              # Zip only on push to main (not manual runs)
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              shell: bash
              run: |
                  set -euo pipefail
                  zip -r V5.zip . -x ".git/*" ".github/*" ".vscode/*" "README.md" ".gitignore"
                  echo "ZIP_EXISTS=true" >> "$GITHUB_ENV"

            - name: Send to Discord
              env:
                  WEBHOOK: ${{ secrets.PUSH_NOTIFIER }}
              shell: bash
              run: |
                  set -euo pipefail

                  COMMIT_MSG="$(git log -1 --pretty=%B)"

                  # Split into <=1930-char chunks (Discord content limit is 2000; 1930 leaves breathing room)
                  mapfile -t MSG_CHUNKS < <(printf '%s' "$COMMIT_MSG" | fold -s -w 1930)

                  # Fallback if commit message is empty for any reason
                  if [[ "${#MSG_CHUNKS[@]}" -eq 0 ]]; then
                    MSG_CHUNKS=("No commit message.")
                  fi

                  FIRST_MSG="${MSG_CHUNKS[0]}"

                  PAYLOAD="$(jq -cn \
                    --arg msg "$FIRST_MSG" \
                    --arg url "$COMMIT_URL" \
                    --arg author "$DISCORD_AUTHOR" \
                    --arg branch "$BRANCH" \
                    --arg time "$TIMESTAMP" \
                    --arg stats "$STATS_TEXT" \
                    --arg types "$FILE_TYPES" \
                    --arg total "${#MSG_CHUNKS[@]}" \
                    '{
                      username: "V5 Commits",
                      avatar_url: "https://p7.hiclipart.com/preview/227/12/28/catgirl-anime-kawaii-manga-cat.jpg",
                      embeds: [{
                        title: "New Commit",
                        description: (
                          "📝 **Summary**\n" + $msg +
                          "\n\n[View Commit](" + $url + ")" +
                          (if ($total|tonumber) > 1 then "\n\n*(continued in next messages)*" else "" end)
                        ),
                        color: 3447003,
                        timestamp: $time,
                        fields: [
                          {name: "Author", value: $author, inline: true},
                          {name: "Branch", value: $branch, inline: true},
                          {name: "📊 Changes", value: $stats, inline: false},
                          {name: "📂 File Types", value: $types, inline: false}
                        ]
                      }]
                    }'
                  )"

                  CURL_ARGS=(-F "payload_json=$PAYLOAD;type=application/json")

                  if [[ "${ZIP_EXISTS:-false}" == "true" ]]; then
                    CURL_ARGS+=(-F "files[0]=@V5.zip;filename=V5.zip")
                  fi

                  # Send first message (embed + optional zip)
                  curl -sS --fail-with-body "${CURL_ARGS[@]}" "$WEBHOOK"

                  # Send remaining chunks as plain messages
                  for ((i = 1; i < ${#MSG_CHUNKS[@]}; i++)); do
                    FOLLOWUP_PAYLOAD="$(jq -cn \
                      --arg content "${MSG_CHUNKS[$i]}" \
                      --arg idx "$((i+1))" \
                      --arg total "${#MSG_CHUNKS[@]}" \
                      '{
                        username: "V5 Commits",
                        avatar_url: "https://p7.hiclipart.com/preview/227/12/28/catgirl-anime-kawaii-manga-cat.jpg",
                        content: ("(" + $idx + "/" + $total + ") " + $content)
                      }'
                    )"

                    curl -sS --fail-with-body \
                      -H "Content-Type: application/json" \
                      -d "$FOLLOWUP_PAYLOAD" \
                      "$WEBHOOK"
                  done
